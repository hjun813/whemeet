<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>⚡ 미친넘들 약속 날짜 정하기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    :root {
      --app-bg: #f8fafc;
      --card-bg: #ffffff;
      --primary: #3b82f6;
      /* iOS style blue */
      --primary-active: #2563eb;
      --danger: #ef4444;
      --success: #22c55e;
    }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol', sans-serif;
      background-color: #e2e8f0;
      /* Darker bg outside mobile view */
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior-y: none;
      /* Prevent bounce on mobile */
    }

    /* Mobile constraint wrapper */
    .app-container {
      max-width: 430px;
      /* iPhone Pro Max width approx */
      margin: 0 auto;
      background-color: var(--app-bg);
      min-height: 100dvh;
      position: relative;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.05);
      display: flex;
      flex-direction: column;
    }

    /* Haptic active feedback */
    .tap-effect:active {
      transform: scale(0.96);
      transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Smooth transitions */
    .transition-all-custom {
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Custom Scrollbar for hidden elements if needed */
    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }

    /* Modal Animation */
    @keyframes slideUp {
      from {
        transform: translateY(100%);
      }

      to {
        transform: translateY(0);
      }
    }

    .animate-slide-up {
      animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes fadeOut {
      from {
        opacity: 1;
      }

      to {
        opacity: 0;
      }
    }

    .animate-fade-out {
      animation: fadeOut 0.2s ease forwards;
    }

    /* Calendar grid setup */
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }

    /* Checkbox styling */
    .custom-checkbox {
      appearance: none;
      width: 24px;
      height: 24px;
      border: 2px solid #cbd5e1;
      border-radius: 6px;
      outline: none;
      cursor: pointer;
      position: relative;
      transition: all 0.2s;
    }

    .custom-checkbox:checked {
      background-color: var(--danger);
      border-color: var(--danger);
    }

    .custom-checkbox:checked::after {
      content: '';
      position: absolute;
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(45deg);
      width: 6px;
      height: 12px;
      border: solid white;
      border-width: 0 2px 2px 0;
    }

    /* Hide specific days easily */
    .day-disabled {
      color: #94a3b8;
      pointer-events: none;
      opacity: 0.5;
    }
  </style>
</head>

<body class="text-slate-800 antialiased selection:bg-blue-200">

  <div class="app-container">

    <header class="sticky top-0 z-40 bg-white/90 backdrop-blur-md border-b border-slate-200 pt-safe-top">
      <div class="px-5 py-4">
        <div class="flex justify-between items-center mb-3">
          <div class="flex items-center gap-2">
            <h1 class="text-xl font-bold tracking-tight text-slate-900">⚡ 약속 날짜 정하기</h1>
            <span id="syncStatus"
              class="text-[10px] font-semibold bg-blue-100 text-blue-600 px-2 py-0.5 rounded-full shadow-sm animate-pulse">동기화

          <button id="btnSettings" class="text-slate-400 p-2 -mr-2 tap-effect rounded-full hover:bg-slate-100">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z">
              </path>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"

            </svg>
          </button>
        </div>

        <div class="relative">
          <label for="userSelect" class="block text-xs font-semibold text-slate-500 mb-1 ml-1">현재 입력 중인 사용자</label>
          <div class="relative">
            <select id="userSelect"
              class="w-full bg-slate-100 border-none rounded-xl py-3 px-4 text-base font-semibold text-slate-800 appearance-none outline-none focus:ring-2 focus:ring-blue-500 tap-effect">
              <!-- Options injected via JS -->

            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-500">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>

            </div>

        </div>
        <div class="mt-2 flex justify-between items-center text-xs px-1">
          <span id="selectedCountMsg" class="text-slate-500">안 되는 날짜: 0개</span>
          <button id="btnResetUser" class="text-blue-500 font-medium tap-effect">이 사용자 초기화</button>
        </div>
      </div>
    </header>

    <main class="flex-1 overflow-y-auto pb-28 px-4 pt-4 space-y-6">

      <div class="bg-red-50 border border-red-100 rounded-xl p-3 flex items-start gap-2 shadow-sm">
        <span class="text-red-500 mt-0.5">⚠️</span>
        <p class="text-sm text-red-700 font-medium leading-relaxed">이 날은 안 돼요! <br>참석이 <strong
            class="font-bold underline decoration-red-300 underline-offset-2">불가능한 날짜</strong>를 모두 체크해주세요.</p>
      </div>

      <!-- Calendar Card -->
      <section class="bg-white rounded-2xl shadow-sm border border-slate-100 p-4">
        <!-- Calendar Header -->
        <div class="flex items-center justify-between mb-4">
          <button id="btnPrevMonth"

          <div class="flex flex-col items-center tap-effect" id="btnToday" style="cursor:pointer;">

          <button id="btnNextMonth"

        <div class="mt-3 text-center">

            참석 불가능한 금, 토, 일요일을 선택해주세요.
          </p>
        </div>
      </section>

      <!-- Quick Select Card -->
      <section class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5">
        <h3 class="text-base font-bold text-slate-800 mb-4 flex items-center gap-2">
          <svg class="w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z">

    </main>

    <footer

        class="w-full bg-blue-600 text-white font-bold text-lg rounded-xl py-4 tap-effect shadow-lg shadow-blue-500/30 flex items-center justify-center gap-2 transition-all-custom active:bg-blue-700">

    <div id="resultsModal" class="fixed inset-0 z-50 flex items-end justify-center pointer-events-none sm:items-center">

      </div>

      <!-- Modal Content -->
      <div id="modalContent"
        class="bg-slate-50 w-full max-w-md rounded-t-3xl sm:rounded-3xl p-6 transform translate-y-full transition-transform duration-300 pointer-events-auto flex flex-col max-h-[85vh] shadow-2xl">
        <div class="w-12 h-1.5 bg-slate-300 rounded-full mx-auto mb-6"></div>

        <div class="flex justify-between items-center mb-4">
          <h2 class="text-xl font-bold text-slate-900">결과 확인</h2>

    <!-- Global Settings Modal (Hidden by default) -->
    <div id="settingsModal" class="fixed inset-0 z-50 flex items-center justify-center pointer-events-none hidden">
      <div class="absolute inset-0 bg-slate-900/40 pointer-events-auto" id="settingsBackdrop"></div>
      <div class="bg-white w-5/6 max-w-xs rounded-2xl p-6 pointer-events-auto shadow-2xl z-10">
        <h3 class="text-lg font-bold mb-4">데이터 관리</h3>
        <p class="text-sm text-slate-500 mb-6">모든 사용자의 선택 데이터를 초기화하시겠습니까? 이 작업은 되돌릴 수 없으며, 모든 접속자의 화면에서 즉시 삭제됩니다.</p>
        <div class="flex flex-col gap-3">

            초기화</button>

            class="w-full py-3 bg-slate-100 text-slate-700 font-bold rounded-xl tap-effect">취소</button>
        </div>
      </div>
    </div>

    <div id="confirmModal" class="fixed inset-0 z-[60] flex items-center justify-center pointer-events-none hidden">
      <div class="absolute inset-0 bg-slate-900/40 pointer-events-auto transition-opacity duration-200"
        id="confirmBackdrop"></div>
      <div
        class="bg-white w-5/6 max-w-xs rounded-2xl p-6 pointer-events-auto shadow-2xl z-10 transform transition-all duration-200 scale-95 opacity-0"
        id="confirmContent">
        <h3 id="confirmTitle" class="text-lg font-bold mb-2 text-slate-900">확인</h3>
        <p id="confirmMessage" class="text-sm text-slate-500 mb-6">진행하시겠습니까?</p>
        <div class="flex gap-3">
          <button id="btnConfirmCancel"
            class="flex-1 py-3 bg-slate-100 text-slate-700 font-bold rounded-xl tap-effect">취소</button>
          <button id="btnConfirmOk"
            class="flex-1 py-3 bg-blue-500 text-white font-bold rounded-xl tap-effect">확인</button>
        </div>
      </div>
    </div>

    <!-- 알림(Alert) 모달 추가 -->
    <div id="alertModal" class="fixed inset-0 z-[60] flex items-center justify-center pointer-events-none hidden">
      <div class="absolute inset-0 bg-slate-900/40 pointer-events-auto" id="alertBackdrop"></div>
      <div
        class="bg-white w-5/6 max-w-xs rounded-2xl p-6 pointer-events-auto shadow-2xl z-10 transform transition-all duration-200">
        <h3 class="text-lg font-bold mb-2 text-slate-900">알림</h3>
        <p id="alertMessage" class="text-sm text-slate-500 mb-6">메시지</p>
        <button id="btnAlertOk" class="w-full py-3 bg-blue-500 text-white font-bold rounded-xl tap-effect">확인</button>
      </div>
    </div>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDvSCNlDN2S3IZG7pNhOqQziUYzHcM1w-E",
      authDomain: "whemeet.firebaseapp.com",
      projectId: "whemeet",
      storageBucket: "whemeet.firebasestorage.app",
      messagingSenderId: "183649790606",
      appId: "1:183649790606:web:0487d454a744fa417437df",
      measurementId: "G-F3XHR2CLJD"
    };
    /**
     * App State & Constants
     */
    const USERS = ['현준', '준호', '장근', '윤호', '윤재', '세원'];
    const TOTAL_USERS = USERS.length;

    let state = {
      currentUser: USERS[0],
      currentDate: new Date(),
      selections: {}
    };

    const today = new Date();
    const simulatedToday = new Date(2026, 6, 21); // 시뮬레이션용 오늘 날짜

    let db, auth, syncDocRef;

    /**
     * DOM Elements
     */
    const els = {
      userSelect: document.getElementById('userSelect'),
      currentMonthYear: document.getElementById('currentMonthYear'),
      calendarDays: document.getElementById('calendarDays'),
      btnPrevMonth: document.getElementById('btnPrevMonth'),
      btnNextMonth: document.getElementById('btnNextMonth'),
      btnToday: document.getElementById('btnToday'),
      quickSelectContainer: document.getElementById('quickSelectContainer'),
      btnCalculate: document.getElementById('btnCalculate'),
      resultsModal: document.getElementById('resultsModal'),
      modalBackdrop: document.getElementById('modalBackdrop'),
      modalContent: document.getElementById('modalContent'),
      btnCloseModal: document.getElementById('btnCloseModal'),
      resultsContainer: document.getElementById('resultsContainer'),
      selectedCountMsg: document.getElementById('selectedCountMsg'),
      btnResetUser: document.getElementById('btnResetUser'),
      btnSettings: document.getElementById('btnSettings'),
      settingsModal: document.getElementById('settingsModal'),
      settingsBackdrop: document.getElementById('settingsBackdrop'),
      btnResetAll: document.getElementById('btnResetAll'),
      btnCloseSettings: document.getElementById('btnCloseSettings'),
      syncStatus: document.getElementById('syncStatus'),

      // Modals
      confirmModal: document.getElementById('confirmModal'),
      confirmBackdrop: document.getElementById('confirmBackdrop'),
      confirmContent: document.getElementById('confirmContent'),
      confirmTitle: document.getElementById('confirmTitle'),
      confirmMessage: document.getElementById('confirmMessage'),
      btnConfirmCancel: document.getElementById('btnConfirmCancel'),
      btnConfirmOk: document.getElementById('btnConfirmOk'),
      alertModal: document.getElementById('alertModal'),
      alertMessage: document.getElementById('alertMessage'),
      btnAlertOk: document.getElementById('btnAlertOk')
    };

    /**
     * Utilities
     */
    const utils = {
      formatDateStr(year, month, day) {
        return `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
      },
      parseDateStr(str) {
        const [y, m, d] = str.split('-');
        return new Date(y, m - 1, d);
      },
      getDisplayDay(dateStr) {
        const days = ['일', '월', '화', '수', '목', '금', '토'];
        const d = this.parseDateStr(dateStr);
        return `${d.getMonth() + 1}월 ${d.getDate()}일 (${days[d.getDay()]})`;
      },
      triggerHaptic() {
        if (navigator.vibrate) {
          navigator.vibrate(10);
        }
      },
      showAlert(message) {
        els.alertMessage.textContent = message;
        els.alertModal.classList.remove('hidden');
        els.btnAlertOk.onclick = () => els.alertModal.classList.add('hidden');
      },
      showConfirm(title, message, isDestructive, onConfirm) {
        els.confirmTitle.textContent = title;
        els.confirmMessage.textContent = message;

        els.btnConfirmOk.className = `flex-1 py-3 font-bold rounded-xl tap-effect text-white ${isDestructive ? 'bg-red-500 hover:bg-red-600' : 'bg-blue-500 hover:bg-blue-600'}`;

        els.confirmModal.classList.remove('hidden');
        // 약간의 지연 후 애니메이션 클래스 적용
        setTimeout(() => {
          els.confirmContent.classList.remove('scale-95', 'opacity-0');
          els.confirmContent.classList.add('scale-100', 'opacity-100');
        }, 10);

        const cleanup = () => {
          els.confirmContent.classList.remove('scale-100', 'opacity-100');
          els.confirmContent.classList.add('scale-95', 'opacity-0');
          setTimeout(() => {
            els.confirmModal.classList.add('hidden');
          }, 200);
        };

        els.btnConfirmCancel.onclick = cleanup;
        els.btnConfirmOk.onclick = () => {
          cleanup();
          onConfirm();
        };
      }
    };

    /**
     * Core Logic & Cloud Sync
     */
    async function initApp() {
      initEmptySelections();

      // Initialize User Dropdown
      els.userSelect.innerHTML = USERS.map(u => `<option value="${u}">${u}</option>`).join('');
      els.userSelect.value = state.currentUser;

      bindEvents();
      renderCalendar();
      updateUIState();

      // 실시간 연동 (Cloud Sync) 시작
      await connectToCloud();
    }

    async function connectToCloud() {
      try {
        // [버그 수정] 임시 설정이 아닌, 직접 붙여넣으신 firebaseConfig를 정확히 사용하도록 변경!
        const app = initializeApp(firebaseConfig);
        db = getFirestore(app);
        auth = getAuth(app);

        // 인증 처리
        try {
          await signInAnonymously(auth);
        } catch (error) {
          // 채팅창 미리보기 환경을 위한 예외 처리
          if (typeof __initial_auth_token !== 'undefined') {
            await signInWithCustomToken(auth, __initial_auth_token);
          } else {
            throw error; // 진짜 에러일 경우 던짐
          }
        }

        if (!auth.currentUser) throw new Error("인증 실패");

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'meetup-coord-v2';
        syncDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'selections', 'shared_state');

        // 데이터 실시간 감지
        onSnapshot(syncDocRef, (docSnap) => {
          if (docSnap.exists()) {
            const data = docSnap.data();
            USERS.forEach(u => {
              if (data[u]) state.selections[u] = data[u];
            });
          } else {
            // 최초 문서 생성
            saveStateToCloud();
          }

          els.syncStatus.textContent = "실시간 연동됨";
          els.syncStatus.className = "text-[10px] font-semibold bg-green-100 text-green-700 px-2 py-0.5 rounded-full shadow-sm";

          renderCalendar();
          updateUIState();
        }, (error) => {
          console.error("Sync error:", error);
          els.syncStatus.textContent = "오프라인 모드";
          els.syncStatus.className = "text-[10px] font-semibold bg-slate-100 text-slate-500 px-2 py-0.5 rounded-full shadow-sm";
        });

      } catch (e) {
        console.warn("Cloud 연결 실패. 로컬 모드로 동작합니다.", e);
        els.syncStatus.textContent = "오프라인 모드";
        els.syncStatus.className = "text-[10px] font-semibold bg-slate-100 text-slate-500 px-2 py-0.5 rounded-full shadow-sm";
      }
    }

    function initEmptySelections() {
      state.selections = {};
      USERS.forEach(u => state.selections[u] = []);
    }

    async function saveStateToCloud() {
      if (!syncDocRef) return; // 클라우드 연결 안 된 경우 무시

      els.syncStatus.textContent = "저장 중...";
      try {
        await setDoc(syncDocRef, state.selections);
        els.syncStatus.textContent = "실시간 연동됨";
      } catch (e) {
        console.error("Error saving state:", e);
        els.syncStatus.textContent = "저장 실패";
      }
    }

    function bindEvents() {
      els.userSelect.addEventListener('change', (e) => {
        state.currentUser = e.target.value;
        utils.triggerHaptic();
        renderCalendar();
        updateUIState();
      });

      els.btnPrevMonth.addEventListener('click', () => {
        state.currentDate.setMonth(state.currentDate.getMonth() - 1);
        utils.triggerHaptic();
        renderCalendar();
      });

      els.btnNextMonth.addEventListener('click', () => {
        state.currentDate.setMonth(state.currentDate.getMonth() + 1);
        utils.triggerHaptic();
        renderCalendar();
      });

      els.btnToday.addEventListener('click', () => {
        state.currentDate = new Date(); // Or simulatedToday
        utils.triggerHaptic();
        renderCalendar();
      });

      // Event Delegation for calendar dates
      els.calendarDays.addEventListener('click', (e) => {
        const cell = e.target.closest('.date-cell');
        if (cell && !cell.classList.contains('day-disabled')) {
          const dateStr = cell.dataset.date;
          toggleDateSelection(dateStr);
        }
      });

      els.quickSelectContainer.addEventListener('change', (e) => {
        if (e.target.classList.contains('qs-checkbox')) {
          handleQuickSelect(e.target);
        }
      });

      els.btnCalculate.addEventListener('click', () => {
        utils.triggerHaptic();
        calculateAndShowResults();
      });

      els.btnCloseModal.addEventListener('click', closeModal);
      els.modalBackdrop.addEventListener('click', closeModal);

      // 초기화 버튼 (Confirm 모달 연동)
      els.btnResetUser.addEventListener('click', () => {
        utils.showConfirm(
          "사용자 데이터 초기화",
          `${state.currentUser}님의 불가 날짜를 모두 비우시겠습니까?`,
          true,
          () => {
            state.selections[state.currentUser] = [];
            saveStateToCloud();
            renderCalendar();
            updateUIState();
          }
        );
      });

      els.btnSettings.addEventListener('click', () => {
        els.settingsModal.classList.remove('hidden');
      });
      els.btnCloseSettings.addEventListener('click', () => {
        els.settingsModal.classList.add('hidden');
      });
      els.settingsBackdrop.addEventListener('click', () => {
        els.settingsModal.classList.add('hidden');
      });

      // 전체 초기화 (Confirm 모달 연동)
      els.btnResetAll.addEventListener('click', () => {
        els.settingsModal.classList.add('hidden'); // 설정 모달 닫고
        utils.showConfirm(
          "전체 데이터 초기화",
          "모든 사용자의 데이터를 지우시겠습니까? 이 작업은 모든 사람의 화면에서 실시간으로 삭제됩니다.",
          true,
          () => {
            initEmptySelections();
            saveStateToCloud();
            renderCalendar();
            updateUIState();
            utils.showAlert('모든 데이터가 성공적으로 초기화되었습니다.');
          }
        );
      });
    }

    function renderCalendar() {
      const year = state.currentDate.getFullYear();
      const month = state.currentDate.getMonth();

      els.currentMonthYear.textContent = `${year}년 ${month + 1}월`;

      const firstDayIndex = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();

      const realTodayStr = utils.formatDateStr(today.getFullYear(), today.getMonth(), today.getDate());

      let html = '';

      for (let i = 0; i < firstDayIndex; i++) {
        html += `<div class="p-2"></div>`;
      }

      for (let day = 1; day <= daysInMonth; day++) {
        const dateObj = new Date(year, month, day);
        const dayOfWeek = dateObj.getDay();
        const dateStr = utils.formatDateStr(year, month, day);

        const isSelected = state.selections[state.currentUser].includes(dateStr);
        const isToday = dateStr === realTodayStr;

        // Allow only Fri(5), Sat(6), Sun(0)
        const isWeekend = dayOfWeek === 0 || dayOfWeek === 5 || dayOfWeek === 6;
        const isDisabled = !isWeekend;

        let baseClasses = "relative flex items-center justify-center w-full aspect-square rounded-xl text-sm font-semibold transition-all-custom select-none ";
        let textClasses = "";
        let bgClasses = "";

        if (isDisabled) {
          baseClasses += "day-disabled text-slate-300";
        } else {
          baseClasses += "tap-effect cursor-pointer date-cell ";

          if (isSelected) {
            bgClasses = "bg-red-500 text-white shadow-md shadow-red-500/40 transform scale-95";
          } else {
            bgClasses = "bg-slate-50 hover:bg-slate-100 text-slate-700 border border-slate-100";
            if (dayOfWeek === 0) textClasses = "text-red-500";
            else if (dayOfWeek === 6) textClasses = "text-blue-500";
          }
        }

        const todayBadge = isToday && !isSelected ? `<div class="absolute bottom-1 left-1/2 -translate-x-1/2 w-1 h-1 bg-blue-500 rounded-full"></div>` : '';
        const checkIcon = isSelected ? `<svg class="absolute top-1 right-1 w-3 h-3 text-white opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>` : '';

        html += `
                    <div class="${baseClasses} ${bgClasses} ${textClasses}" data-date="${dateStr}">
                        ${day}
                        ${todayBadge}
                        ${checkIcon}
                    </div>
                `;
      }

      els.calendarDays.innerHTML = html;
      renderQuickSelect(year, month);
    }

    function toggleDateSelection(dateStr) {
      utils.triggerHaptic();
      const userSelections = state.selections[state.currentUser];
      const index = userSelections.indexOf(dateStr);

      if (index > -1) {
        userSelections.splice(index, 1);
      } else {
        userSelections.push(dateStr);
      }

      // 로컬 상태 즉시 반영 후 클라우드 저장
      renderCalendar();
      updateUIState();
      saveStateToCloud();
    }

    function renderQuickSelect(year, month) {
      let html = '';

      const getWeekendDateStrs = (weekIndex) => {
        let fridays = [];
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        for (let d = 1; d <= daysInMonth; d++) {
          if (new Date(year, month, d).getDay() === 5) fridays.push(d);
        }

        const friDay = fridays[weekIndex];
        if (!friDay) return null;

        const dateFri = new Date(year, month, friDay);
        const dateSat = new Date(year, month, friDay + 1);
        const dateSun = new Date(year, month, friDay + 2);

        return {
          fri: dateFri.getMonth() === month ? utils.formatDateStr(year, month, dateFri.getDate()) : null,
          sat: dateSat.getMonth() === month ? utils.formatDateStr(year, month, dateSat.getDate()) : null,
          sun: dateSun.getMonth() === month ? utils.formatDateStr(year, month, dateSun.getDate()) : null
        };
      };

      const userSelections = state.selections[state.currentUser];

      for (let i = 0; i < 5; i++) {
        const dates = getWeekendDateStrs(i);
        if (!dates) continue;

        const weekLabel = `${month + 1}월 ${['첫', '둘', '셋', '넷', '다섯'][i]}째주`;

        const hasFri = dates.fri !== null;
        const hasSat = dates.sat !== null;
        const hasSun = dates.sun !== null;

        const isFriSatChecked = hasFri && hasSat && userSelections.includes(dates.fri) && userSelections.includes(dates.sat);
        const isSatSunChecked = hasSat && hasSun && userSelections.includes(dates.sat) && userSelections.includes(dates.sun);

        const friSatData = [dates.fri, dates.sat].filter(Boolean).join(',');
        const satSunData = [dates.sat, dates.sun].filter(Boolean).join(',');

        if (hasFri && hasSat) {
          html += `
                        <label class="flex items-center gap-3 p-3 bg-slate-50 rounded-xl cursor-pointer hover:bg-slate-100 transition-colors tap-effect">
                            <input type="checkbox" class="custom-checkbox qs-checkbox" 
                                data-dates="${friSatData}" 
                                ${isFriSatChecked ? 'checked' : ''}>
                            <span class="text-sm font-medium text-slate-700">${weekLabel} (금~토) 불가</span>
                        </label>
                    `;
        }

        if (hasSat && hasSun) {
          html += `
                        <label class="flex items-center gap-3 p-3 bg-slate-50 rounded-xl cursor-pointer hover:bg-slate-100 transition-colors tap-effect mt-2">
                            <input type="checkbox" class="custom-checkbox qs-checkbox" 
                                data-dates="${satSunData}"
                                ${isSatSunChecked ? 'checked' : ''}>
                            <span class="text-sm font-medium text-slate-700">${weekLabel} (토~일) 불가</span>
                        </label>
                    `;
        }
      }

      if (html === '') {
        html = `<p class="text-sm text-slate-400 text-center py-2">이번 달은 선택 가능한 주말이 없습니다.</p>`;
      }

      els.quickSelectContainer.innerHTML = html;
    }

    function handleQuickSelect(checkbox) {
      utils.triggerHaptic();
      const dateStrs = checkbox.dataset.dates.split(',');
      const isChecked = checkbox.checked;

      let changed = false;
      dateStrs.forEach(dateStr => {
        if (!dateStr) return;
        const index = state.selections[state.currentUser].indexOf(dateStr);

        if (isChecked && index === -1) {
          state.selections[state.currentUser].push(dateStr);
          changed = true;
        } else if (!isChecked && index > -1) {
          state.selections[state.currentUser].splice(index, 1);
          changed = true;
        }
      });

      if (changed) {
        renderCalendar();
        updateUIState();
        saveStateToCloud(); // 일괄 변경 후 1번만 동기화
      }
    }

    function updateUIState() {
      const count = state.selections[state.currentUser].length;
      els.selectedCountMsg.textContent = `안 되는 날짜: ${count}개`;
      if (count > 0) {
        els.selectedCountMsg.classList.add('text-red-600', 'font-semibold');
        els.selectedCountMsg.classList.remove('text-slate-500');
      } else {
        els.selectedCountMsg.classList.remove('text-red-600', 'font-semibold');
        els.selectedCountMsg.classList.add('text-slate-500');
      }
    }

    function calculateAndShowResults() {
      const targetDates = [];
      const curr = new Date(simulatedToday); // 시뮬레이션 기준 오늘
      curr.setHours(0, 0, 0, 0);
      const endDate = new Date(curr);
      endDate.setDate(endDate.getDate() + 90);

      while (curr <= endDate) {
        const day = curr.getDay();
        if (day === 0 || day === 5 || day === 6) {
          targetDates.push(utils.formatDateStr(curr.getFullYear(), curr.getMonth(), curr.getDate()));
        }
        curr.setDate(curr.getDate() + 1);
      }

      const results = targetDates.map(dateStr => {
        const unavailableUsers = USERS.filter(u => state.selections[u].includes(dateStr));
        const availableUsers = USERS.filter(u => !state.selections[u].includes(dateStr));

        return {
          dateStr: dateStr,
          availableCount: availableUsers.length,
          availableUsers: availableUsers,
          unavailableUsers: unavailableUsers
        };
      });

      results.sort((a, b) => {
        if (b.availableCount !== a.availableCount) return b.availableCount - a.availableCount;
        return new Date(a.dateStr) - new Date(b.dateStr);
      });

      const meaningfulResults = results.filter(r => r.availableCount >= TOTAL_USERS - 3);

      renderResultsModal(meaningfulResults);
      openModal();
    }

    function renderResultsModal(results) {
      let html = '';
      const allAvailable = results.filter(r => r.availableCount === TOTAL_USERS);

      if (results.length === 0) {
        html = `
                    <div class="bg-red-50 border border-red-100 rounded-2xl p-6 text-center">
                        <div class="text-4xl mb-3">😢</div>
                        <h3 class="text-lg font-bold text-red-700 mb-1">가능한 날짜가 없습니다</h3>
                        <p class="text-sm text-red-600">향후 3개월 내에 다수가 모일 수 있는 날이 없네요.</p>
                    </div>
                `;
      } else if (allAvailable.length > 0) {
        html += `
                    <div class="bg-green-50 border border-green-200 rounded-2xl p-5 mb-6 shadow-sm">
                        <div class="flex items-center gap-2 mb-3">
                            <span class="text-2xl">🎉</span>
                            <h3 class="text-lg font-bold text-green-800">모두 가능한 날짜</h3>
                        </div>
                        <div class="space-y-2">
                `;
        allAvailable.forEach(item => {
          html += `
                        <div class="flex justify-between items-center bg-white p-3 rounded-xl border border-green-100 shadow-sm">
                            <span class="font-bold text-green-900">${utils.getDisplayDay(item.dateStr)}</span>
                            <span class="text-xs font-semibold bg-green-100 text-green-700 px-2 py-1 rounded-full">6명 모두</span>
                        </div>
                    `;
        });
        html += `</div></div>`;
      } else {
        html += `
                    <div class="bg-red-50 border border-red-100 rounded-2xl p-5 mb-6 shadow-sm">
                        <div class="flex items-center gap-2 mb-2">
                            <span class="text-2xl">😢</span>
                            <h3 class="text-lg font-bold text-red-800">모두 가능한 날짜가 없습니다</h3>
                        </div>
                        <p class="text-sm text-red-600">대신 아래의 추천 날짜를 확인해보세요.</p>
                    </div>
                `;
      }

      if (results.length > 0) {
        html += `<h4 class="font-bold text-slate-800 mb-3 px-1 flex items-center gap-2"><svg class="w-4 h-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg> 전체 가능일 순위 (향후 3개월)</h4>`;
        html += `<div class="space-y-3">`;

        results.forEach((item, index) => {
          const percentage = (item.availableCount / TOTAL_USERS) * 100;

          let indicators = '';
          for (let i = 0; i < TOTAL_USERS; i++) {
            if (i < item.availableCount) {
              indicators += `<svg class="w-4 h-4 text-yellow-400" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg>`;
            } else {
              indicators += `<svg class="w-4 h-4 text-slate-200" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg>`;
            }
          }

          const isHighlyRecommended = item.availableCount >= 5;
          const cardBg = isHighlyRecommended ? 'bg-blue-50/50' : 'bg-white';
          const borderClass = isHighlyRecommended ? 'border-blue-100' : 'border-slate-100';
          const badgeClass = item.availableCount === 6 ? 'bg-green-100 text-green-700' : (item.availableCount === 5 ? 'bg-blue-100 text-blue-700' : 'bg-slate-100 text-slate-600');

          html += `
                        <div class="${cardBg} border ${borderClass} rounded-2xl p-4 shadow-sm">
                            <div class="flex justify-between items-center mb-2">
                                <div class="font-bold text-slate-800 text-base">${utils.getDisplayDay(item.dateStr)}</div>
                                <div class="flex items-center gap-1.5">
                                    <div class="flex">${indicators}</div>
                                    <span class="text-xs font-bold ${badgeClass} px-2 py-0.5 rounded-md ml-1">${item.availableCount} / 6</span>
                                </div>
                            </div>
                            <div class="w-full bg-slate-100 rounded-full h-1.5 mb-2 overflow-hidden">
                              <div class="bg-blue-500 h-1.5 rounded-full" style="width: ${percentage}%"></div>
                            </div>
                            <div class="text-xs text-slate-600 break-words leading-relaxed mt-1">
                                <span class="font-semibold text-blue-600">가능:</span> ${item.availableUsers.length > 0 ? item.availableUsers.join(', ') : '없음'}<br>
                                ${item.unavailableUsers.length > 0 ? `<span class="font-semibold text-red-500 mt-1 inline-block">불가:</span> <span class="text-slate-500">${item.unavailableUsers.join(', ')}</span>` : ''}
                            </div>
                        </div>
                    `;
        });

        html += `</div>`;
      }

      els.resultsContainer.innerHTML = html;
    }

    function openModal() {
      els.resultsModal.classList.remove('hidden');
      void els.resultsModal.offsetWidth;

      els.modalBackdrop.classList.remove('hidden');
      els.modalBackdrop.classList.add('opacity-100');

      els.modalContent.classList.remove('translate-y-full');

      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      els.modalBackdrop.classList.remove('opacity-100');
      els.modalContent.classList.add('translate-y-full');

      setTimeout(() => {
        els.resultsModal.classList.add('hidden');
        els.modalBackdrop.classList.add('hidden');
        document.body.style.overflow = '';
      }, 300);
    }

    // Boot
    window.addEventListener('DOMContentLoaded', initApp);

  </script>
</body>

</html>
